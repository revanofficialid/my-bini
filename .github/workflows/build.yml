name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova CLI
        run: npm install -g cordova

      - name: Create Cordova Project
        run: |
          cordova create apk_project com.mycompany.myapp "Ryzan Gacor"
          cd apk_project
          cordova platform add android@12.0.1 --save

      - name: Copy HTML to www
        run: |
          cp www/index.html apk_project/www/index.html

      - name: Update config.xml
        run: |
          cat > apk_project/config.xml << 'CONFIGEOF'
          <?xml version='1.0' encoding='utf-8'?>
          <widget id="com.mycompany.myapp" version="1.0.0" xmlns="http://www.w3.org/ns/widgets" xmlns:cdv="http://cordova.apache.org/ns/1.0">
            <name>Ryzan Gacor</name>
            <description>Generated by APK Builder Pro</description>
            <author>APK Builder Pro</author>
            <content src="index.html" />
            <access origin="*" />
            <allow-intent href="http://*/*" />
            <allow-intent href="https://*/*" />
            <platform name="android">
              <preference name="android-minSdkVersion" value="22" />
              <preference name="android-targetSdkVersion" value="33" />
              <preference name="Orientation" value="portrait" />
              <preference name="AndroidWindowSplashScreenAnimatedIcon" value="res/icon/android/icon.png" />
            </platform>
          </widget>
          CONFIGEOF

      - name: Configure Gradle for API 33
        run: |
          cd apk_project
          find platforms/android -name "build.gradle" | head -1 | xargs -I{} sed -i \
            's/compileSdkVersion [0-9]*/compileSdkVersion 33/g' {}

      - name: Build Release APK with Gradle
        run: |
          cd apk_project/platforms/android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2g"

      - name: Generate Keystore & Sign APK
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass apkbuilder \
            -keypass apkbuilder \
            -dname "CN=APKBuilder, OU=Dev, O=APKBuilderPro, L=ID, S=ID, C=ID"

          APK_PATH=$(find apk_project/platforms/android -name "*-release-unsigned.apk" | head -1)
          echo "Found APK: $APK_PATH"

          ALIGNED_APK=${APK_PATH/-release-unsigned.apk/-release-aligned.apk}
          zipalign -v 4 "$APK_PATH" "$ALIGNED_APK"
          APK_PATH="$ALIGNED_APK"

          apksigner sign \
            --ks release.keystore \
            --ks-key-alias release \
            --ks-pass pass:apkbuilder \
            --key-pass pass:apkbuilder \
            --out "Ryzan Gacor-1.0.0-Signed.apk" \
            "$APK_PATH"

          echo "APK_FILE=Ryzan Gacor-1.0.0-Signed.apk" >> $GITHUB_ENV

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ryzan Gacor-v1.0.0-APK
          path: ${{ env.APK_FILE }}
          retention-days: 30
