
name: Build Release Signed APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
        
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      
      - name: Setup Build Tools & Apksigner
        run: sudo apt-get update && sudo apt-get install -y apksigner zipalign
        
      - name: Install Cordova
        run: npm install -g cordova
        
      - name: Build & Sign APK
        run: |
          export CI=true
          
          mkdir -p source_files
          mv config.xml source_files/
          mv www source_files/
          if [ -d "res" ]; then mv res source_files/; fi
          
          cordova create app "com.celengan.ku" "Celenganku"
          cd app
          
          rm -rf www/*
          cp -r ../source_files/www/* www/
          cp ../source_files/config.xml .
          if [ -d "../source_files/res" ]; then cp -r ../source_files/res .; fi
          
          # Gunakan versi Cordova Android 13 yang modern dan support SDK 34
          cordova platform add android@13.0.0
          
          # Build APK resmi dari Cordova
          cordova build android --release -- --packageType=apk
          
          # Bikin Keystore Sementara
          keytool -genkey -v -keystore release.keystore -alias release -keyalg RSA -keysize 2048 -validity 10000 -storepass password123 -keypass password123 -dname "CN=Celenganku,O=Developer,C=ID"
          
          # Cari file Unsigned APK yang baru saja dibuat
          APK_FILE=$(find platforms/android/app/build/outputs/apk/release -name "*-unsigned.apk" | head -n 1)
          
          # Fallback pencarian (Jaga-jaga jika path berubah)
          if [ -z "$APK_FILE" ]; then
             APK_FILE=$(find . -name "*.apk" | head -n 1)
          fi
          
          echo "Ditemukan APK: $APK_FILE"
          
          # Zipalign (Syarat wajib untuk Play Protect)
          zipalign -v -p 4 "$APK_FILE" aligned.apk
          
          # Sign APK Final
          apksigner sign --ks release.keystore --ks-pass pass:password123 --out ../Celenganku-Signed.apk aligned.apk
          
      - name: Upload Final Signed Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Celenganku-Signed-APK
          path: '*Signed.apk'
