name: Build HTML to APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova project
        run: |
          cordova create apk_project com.mycompany.myapp "Ryzan Gacor"

      - name: Copy HTML source
        run: |
          cp www/index.html apk_project/www/index.html

      - name: Write config.xml
        run: |
          cat > apk_project/config.xml << 'CONFIGEOF'
          <?xml version='1.0' encoding='utf-8'?>
          <widget id="com.mycompany.myapp" version="1.0.0" versionCode="1" xmlns="http://www.w3.org/ns/widgets" xmlns:cdv="http://cordova.apache.org/ns/1.0">
            <name>Ryzan Gacor</name>
            <description>Built with APK Builder Pro</description>
            <author>APK Builder Pro</author>
            <content src="index.html" />
            <access origin="*" />
            <allow-intent href="http://*/*" />
            <allow-intent href="https://*/*" />
            <platform name="android">
              <preference name="android-minSdkVersion" value="22" />
              <preference name="android-targetSdkVersion" value="33" />
              <preference name="Orientation" value="default" />
            </platform>
          </widget>
          CONFIGEOF

      - name: Add Android platform
        working-directory: apk_project
        run: cordova platform add android@12.0.1

      - name: Build APK
        working-directory: apk_project
        run: cordova build android
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2g"

      - name: Verify APK output
        run: |
          echo "=== APK FILES ==="
          find apk_project/platforms/android/app/build/outputs/apk -name "*.apk" -ls

      - name: Generate Keystore
        run: |
          keytool -genkey -v             -keystore release.keystore             -alias release             -keyalg RSA             -keysize 2048             -validity 10000             -storepass apkbuilder             -keypass apkbuilder             -dname "CN=APKBuilder, OU=Dev, O=APKBuilderPro, L=ID, S=ID, C=ID"

      - name: Sign APK
        run: |
          UNSIGNED=$(find apk_project/platforms/android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "Signing: $UNSIGNED"
          ALIGNED="Ryzan_Gacor-1.0.0-aligned.apk"
          zipalign -v 4 "$UNSIGNED" "$ALIGNED"
          UNSIGNED="$ALIGNED"
          apksigner sign             --ks release.keystore             --ks-key-alias release             --ks-pass pass:apkbuilder             --key-pass pass:apkbuilder             --out "Ryzan_Gacor-1.0.0-Signed.apk"             "$UNSIGNED"
          echo "APK_FILE=Ryzan_Gacor-1.0.0-Signed.apk" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ryzan_Gacor-v1.0.0-APK
          path: ${{ env.APK_FILE }}
          retention-days: 30
