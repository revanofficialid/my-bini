<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Tracker PRO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{background:#0a0a14;color:#fff;padding:12px;}

h1{text-align:center;color:#c084ff;margin-bottom:10px;}

.card{
  background:#151528;
  padding:12px;
  border-radius:14px;
  margin-bottom:12px;
}

input,select{
  width:100%;
  padding:10px;
  margin-top:6px;
  border:none;
  border-radius:10px;
  background:#0f0f1f;
  color:#fff;
}

button{
  width:100%;
  padding:11px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  background:#a855f7;
  color:white;
  font-weight:bold;
}

button:active{transform:scale(0.96);}

.balance{text-align:center;font-size:20px;margin-bottom:5px;}

.item{
  display:flex;
  justify-content:space-between;
  background:#0f0f1f;
  padding:10px;
  border-radius:10px;
  margin-top:6px;
}

.income{color:#4ade80;}
.expense{color:#fb7185;}

.row{display:flex;gap:6px;}
.row button{flex:1;}

canvas{
  width:100%;
  background:#0f0f1f;
  border-radius:10px;
  margin-top:10px;
}
</style>

</head>
<body>

<h1>💎 Finance PRO</h1>

<div class="card">
  <select id="account"></select>
  <div class="row">
    <button onclick="addAccount()">+ Akun</button>
    <button onclick="deleteAccount()">Hapus</button>
  </div>
</div>

<div class="card">
  <div class="balance">Saldo: Rp <span id="balance">0</span></div>
</div>

<div class="card">
  <input id="desc" placeholder="Deskripsi">
  <input id="amount" type="number" placeholder="Jumlah">
  <select id="type">
    <option value="income">Pemasukan</option>
    <option value="expense">Pengeluaran</option>
  </select>
  <button onclick="addData()">Tambah</button>
</div>

<div class="card">
  <div class="row">
    <button onclick="exportData()">Export</button>
    <button onclick="clearData()">Reset</button>
  </div>
</div>

<div class="card">
  <h3>Grafik</h3>
  <canvas id="chart" height="120"></canvas>
</div>

<div class="card">
  <h3>Riwayat</h3>
  <div id="list"></div>
</div>

<script>
let db = JSON.parse(localStorage.getItem("financePRO")) || {
  accounts: {
    "Utama": []
  }
};

let current = "Utama";

function save(){
  localStorage.setItem("financePRO", JSON.stringify(db));
}

function loadAccounts(){
  let sel = document.getElementById("account");
  sel.innerHTML = "";

  Object.keys(db.accounts).forEach(acc=>{
    sel.innerHTML += `<option ${acc===current?"selected":""}>${acc}</option>`;
  });

  sel.onchange = e=>{
    current = e.target.value;
    render();
  };
}

function addAccount(){
  let name = prompt("Nama akun?");
  if(!name) return;
  db.accounts[name] = [];
  current = name;
  save();
  loadAccounts();
  render();
}

function deleteAccount(){
  if(Object.keys(db.accounts).length===1){
    alert("Minimal 1 akun!");
    return;
  }
  delete db.accounts[current];
  current = Object.keys(db.accounts)[0];
  save();
  loadAccounts();
  render();
}

function addData(){
  let desc = document.getElementById("desc").value;
  let amount = parseInt(document.getElementById("amount").value);
  let type = document.getElementById("type").value;

  if(!desc || !amount) return alert("Isi data!");

  db.accounts[current].push({
    desc, amount, type, date: new Date().toLocaleDateString()
  });

  save();
  render();
}

function clearData(){
  if(confirm("Reset semua data akun ini?")){
    db.accounts[current] = [];
    save();
    render();
  }
}

function exportData(){
  let dataStr = JSON.stringify(db, null, 2);
  let blob = new Blob([dataStr], {type:"application/json"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "finance.json";
  a.click();
}

function render(){
  let list = document.getElementById("list");
  let balance = 0;
  list.innerHTML = "";

  let data = db.accounts[current];

  data.forEach((item,i)=>{
    balance += item.type==="income" ? item.amount : -item.amount;

    list.innerHTML += `
    <div class="item" onclick="removeItem(${i})">
      <span>${item.desc}<br><small>${item.date}</small></span>
      <span class="${item.type}">
        ${item.type==="income"?"+":"-"}Rp${item.amount}
      </span>
    </div>`;
  });

  document.getElementById("balance").innerText = balance;
  drawChart(data);
}

function removeItem(i){
  if(confirm("Hapus data ini?")){
    db.accounts[current].splice(i,1);
    save();
    render();
  }
}

function drawChart(data){
  let canvas = document.getElementById("chart");
  let ctx = canvas.getContext("2d");

  ctx.clearRect(0,0,canvas.width,canvas.height);

  let income = 0, expense = 0;
  data.forEach(d=>{
    if(d.type==="income") income+=d.amount;
    else expense+=d.amount;
  });

  let total = income + expense;
  if(total===0) return;

  let w = canvas.width;
  let h = canvas.height;

  let incWidth = (income/total)*w;
  let expWidth = (expense/total)*w;

  ctx.fillStyle = "#4ade80";
  ctx.fillRect(0,0,incWidth,h);

  ctx.fillStyle = "#fb7185";
  ctx.fillRect(incWidth,0,expWidth,h);
}

loadAccounts();
render();
</script>

</body>
</html>
